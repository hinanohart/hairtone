name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      # v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          fetch-tags: true
      # Refuse to release anything containing maintainer real-identity markers.
      # FRAG pattern: identity tokens are split at source so this guard rule
      # does not self-match against its own definition. Mirrors aa-animator
      # / yuragi precedent.
      - name: Identity-leak guard (history-wide)
        run: |
          set -euo pipefail
          FRAG_A='run''za'
          FRAG_B='DESKTOP-[A-Z0-9]+'
          FRAG_C='/mnt/c/'
          FRAG_D='hin''ata'
          PATTERN="${FRAG_A}|${FRAG_A}isongpu|${FRAG_B}|${FRAG_C}|/home/${FRAG_A}|${FRAG_D}"
          FAIL=0
          REFS=$(git for-each-ref --format='%(refname)' refs/tags refs/heads refs/remotes)
          REFS="HEAD $REFS"
          for ref in $REFS; do
            if git grep -n -E "$PATTERN" "$ref" -- \
                ':!*.lock' ':!*.svg' ':!*.png' ':!*.jpg' ':!*.mp4' ':!*.gif' ':!*.npy' \
                ':!.github/workflows/release.yml' \
                > /tmp/leaks.txt 2>/dev/null; then
              echo "::error::Identity-leak at ref $ref:"
              cat /tmp/leaks.txt
              FAIL=1
            fi
          done
          exit $FAIL
      # v5.6.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Twine metadata check
        run: twine check dist/*
      # v4.5.0
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/hairtone
    permissions:
      id-token: write
    steps:
      # v4.1.8
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: dist
          path: dist/
      # release/v1
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b

  github-release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release with notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*
