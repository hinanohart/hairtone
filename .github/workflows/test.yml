name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: none
  issues: none
  id-token: none

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      # v4.2.2 — pinned to SHA so Dependabot can track upgrades and an
      # attacker who compromises the tag can't silently swap the action.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      # v5.6.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest -ra
      - name: Mypy
        run: mypy src
